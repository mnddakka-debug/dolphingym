<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Bot - مساعد ذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/>
                    </svg>
                    <span>AI Assistant</span>
                </div>
            </div>
            
            <button class="new-chat-btn" onclick="startNewChat()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                </svg>
                <span>محادثة جديدة</span>
            </button>
            
            <div class="model-selector">
                <label for="model-select">اختر النموذج:</label>
                <select id="model-select">
                    <option value="keyless-gpt-4o-mini" selected>GPT-4o Mini</option>
                    <option value="keyless-gpt-o3-mini">GPT-o3 Mini</option>
                    <option value="keyless-claude-3-haiku">Claude 3 Haiku</option>
                    <option value="keyless-mixtral-8x7b">Mixtral 8x7b</option>
                    <option value="keyless-meta-Llama-3.3-70B-Instruct-Turbo">Llama 3.3 70B</option>
                </select>
            </div>

            <div class="language-toggle">
                <label>اللغة:</label>
                <div class="toggle-btns">
                    <button class="lang-btn active" data-lang="ar" onclick="setLanguage('ar')">عربي</button>
                    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">English</button>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="connection-status">متصل</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/>
                    </svg>
                </button>
                <h1 id="header-title">مساعد الذكاء الاصطناعي</h1>
                <div class="header-actions">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" fill="currentColor"/>
                        </svg>
                    </div>
                    <h2 id="welcome-title">مرحباً! أنا مساعدك الذكي</h2>
                    <p id="welcome-text">اكتب أي سؤال وسأحاول مساعدتك. يمكنك الكتابة بالعربية أو الإنجليزية.</p>
                    <div class="quick-actions">
                        <button class="quick-action" onclick="sendQuickMessage('ما هي أحدث التقنيات في الذكاء الاصطناعي؟')">
                            <span>🤖</span> أحدث تقنيات AI
                        </button>
                        <button class="quick-action" onclick="sendQuickMessage('اكتب لي قصة قصيرة')">
                            <span>📝</span> اكتب قصة
                        </button>
                        <button class="quick-action" onclick="sendQuickMessage('What can you help me with?')">
                            <span>💡</span> Help me
                        </button>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <form class="chat-form" onsubmit="sendMessage(event)">
                    <div class="input-wrapper">
                        <textarea 
                            id="message-input" 
                            placeholder="اكتب رسالتك هنا... / Type your message..."
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button type="submit" class="send-btn" id="send-btn">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="input-hint" id="input-hint">اضغط Enter للإرسال أو Shift+Enter لسطر جديد</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
